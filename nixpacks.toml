[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.26.1 --prefer-offline",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/web-admin run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.cjs"
